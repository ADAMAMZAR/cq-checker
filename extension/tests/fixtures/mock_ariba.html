<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Supplier Management | Ariba</title>
</head>
<body>
  <!-- Header with supplier name -->
  <div class="supplier-header">
    <span class="name">Ariba Test Supplier Ltd</span>
  </div>
  
  <!-- Workspace title -->
  <div id="workspace-title">Compliance Verification Workspace</div>

  <!-- Ariba QA section to expand -->
  <div flexlayout="row" class="smq-item-container">
    <span class="label-span">1.1 Standard compliance certificates</span>
    
    <div class="content-2" content2>
      <button aria-label="expand" class="expansion-button">Expand Section</button>
      
      <div class="row-container">
        <span class="row-label">Certificate Type</span>
        <span class="row-content">QSHE</span>
      </div>

      <!-- File Attachment container -->
      <div class="file-name-container">
        <a class="file-name" href="http://127.0.0.1:8000/static/dummy_cert.pdf" download="dummy_cert.pdf">
          dummy_cert.pdf
        </a>
      </div>
    </div>
  </div>
</body>
</html>
